name: PR Check

# Validates contributor PRs: secrets, Sarvam API allowlist, recipe structure.
# No API keys or external services required.

on:
  pull_request:
    branches: [main]
    paths:
      - "examples/**"
      - "notebooks/**"
      - "scripts/**"
      - "tests/**"
      - "requirements-dev.txt"
      - ".github/workflows/pr-check.yml"
      - "scripts/sarvam_api_rules.json"

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Verify API allowlist is current
        run: python scripts/sync_sarvam_rules.py --check

      - name: Validate changed examples and notebooks
        env:
          BASE_REF: ${{ github.base_ref }}
        run: python scripts/validate_pr.py --base-ref "$BASE_REF"

      - name: Validate changed recipe directories
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          python - <<'PYEOF'
          import os
          import subprocess
          import sys
          from pathlib import Path

          base = os.environ["BASE_REF"]
          result = subprocess.run(
              ["git", "diff", "--name-only", f"origin/{base}...HEAD"],
              capture_output=True,
              text=True,
              check=True,
          )

          dirs: set[str] = set()
          for path in result.stdout.splitlines():
              parts = path.split("/")
              if (
                  len(parts) >= 2
                  and parts[0] == "examples"
                  and parts[1] not in {"TEMPLATE", ""}
                  and Path(f"examples/{parts[1]}").is_dir()
                  and Path(f"examples/{parts[1]}/.env.example").exists()
              ):
                  dirs.add(f"examples/{parts[1]}")

          if not dirs:
              print("No recipe directories changed — skipping.")
              sys.exit(0)

          failed = 0
          for directory in sorted(dirs):
              print(f"=== Validating recipe: {directory} ===")
              proc = subprocess.run(
                  [sys.executable, "scripts/validate_recipe.py", directory],
              )
              if proc.returncode != 0:
                  failed = 1
          sys.exit(failed)
          PYEOF
